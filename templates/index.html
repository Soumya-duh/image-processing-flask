<!DOCTYPE html>
<html>
<head>
    <title>Multi-Scale Image Processing</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        .container {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 80%;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        img {
            margin: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<h1>Multi-Scale Image Processing</h1>

<div class="container">
    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br><br>
        <button type="submit">Process Image</button>
    </form>
</div>

<!-- ✅ SHOW ORIGINAL IMAGE -->
{% if original %}
<div class="container">
    <h2>Original Image</h2>
    <img src="{{ original }}" width="300">
</div>
{% endif %}

<!-- ✅ SHOW OUTPUTS -->
{% if outputs %}
<div class="container">
    <h2>Edge Detection Results</h2>

    <div>
        <h3>Scale 0.3</h3>
        <img src="{{ outputs[0] }}" width="250">
    </div>

    <div>
        <h3>Scale 0.6</h3>
        <img src="{{ outputs[1] }}" width="250">
    </div>

    <div>
        <h3>Scale 1.0</h3>
        <img src="{{ outputs[2] }}" width="250">
    </div>
</div>
{% endif %}

</body>
</html>
